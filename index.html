const container = document.getElementById("questions");

questions.forEach((q,index)=>{

select.appendChild(o);
});

// ✅ SEND TO DISCORD (SAFE FOR MANY QUESTIONS)
async function submitForm(){

const name=document.getElementById("username").value;

if(!name){
alert("Enter your name!");
return;
}

let lines=[];

questions.forEach((q,index)=>{
let answer=document.getElementById(`q${index}`).value;

lines.push(
`${index+1}. ${q}\n➡️ ${answer}`
);
});

// Discord has 2000 char limit → split messages
function chunkText(arr,limit=1800){
let chunks=[];
let current="";

arr.forEach(line=>{
if((current+line).length>limit){
chunks.push(current);
current="";
}
current+=line+"\n\n";
});
chunks.push(current);
return chunks;
}
